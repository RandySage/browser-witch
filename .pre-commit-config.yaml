repos:
  - repo: local
    hooks:
      - id: rustfmt
        name: rustfmt
        description: Run cargo fmt on files included in the commit.
        entry: cargo fmt --all --
        pass_filenames: true
        types: [file, rust]
        language: system

      - id: clippy
        name: clippy
        description: Run cargo clippy on files included in the commit.
        entry: cargo clippy --all-targets --all-features -- -D warnings
        pass_filenames: false
        types: [file, rust]
        language: system
